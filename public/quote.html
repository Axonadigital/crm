<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offert</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
    .loading {
      display: flex; justify-content: center; align-items: center;
      height: 100vh; font-family: Inter, -apple-system, sans-serif;
      color: #525252; font-size: 15px;
    }
    .error {
      display: flex; justify-content: center; align-items: center;
      height: 100vh; font-family: Inter, -apple-system, sans-serif;
    }
    .error-card {
      text-align: center; max-width: 400px; padding: 40px;
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .error h1 { font-size: 20px; color: #0a0a0a; margin-bottom: 8px; }
    .error p { font-size: 14px; color: #525252; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="loading" class="loading">Laddar offert...</div>
  <iframe id="viewer" style="display:none"></iframe>
  <div id="error" class="error" style="display:none">
    <div class="error-card">
      <h1>Offert hittades inte</h1>
      <p>Offerten kunde inte laddas. Kontrollera länken eller kontakta avsändaren.</p>
    </div>
  </div>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { showError(); return; }

      try {
        const apiBase = 'https://hgyusrlrzdahucljvqsz.supabase.co/functions/v1';
        const res = await fetch(apiBase + '/serve_quote?id=' + encodeURIComponent(id) + '&raw=1');
        if (!res.ok) { showError(); return; }

        const data = await res.json();
        if (!data.html) { showError(); return; }

        document.getElementById('loading').style.display = 'none';
        const iframe = document.getElementById('viewer');
        iframe.style.display = 'block';
        iframe.srcdoc = data.html;

        // Update page title from quote
        const m = data.html.match(/<title>(.*?)<\/title>/);
        if (m) document.title = m[1];
      } catch (e) {
        showError();
      }

      function showError() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
